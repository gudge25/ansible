---
- name: Add IP to Mikrotik Address List
  hosts: all
  gather_facts: false
  strategy: free

  tasks:
    - debug:
      var: address_list
    - name: Add IP to Address List
      community.network.routeros_command:
        commands:
          - /ip firewall address-list add list={{ address_list }} address={{ ip_address }} comment="Added by Ansible"
      register: result

    - debug:
        msg: "Command output: {{ result.stdout }}"
